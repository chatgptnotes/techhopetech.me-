// Fetch fresh contacts from Supabase → localStorage → re-render
// Preserves localStorage-only fields (hidden flag) that aren't in Supabase yet
async function syncContactsFromSupabase() {
  try {
    const { data, error } = await _sb.from('bni_contacts').select('*');
    if (error || !data || !data.length) return;
    const existing = JSON.parse(localStorage.getItem('bni_contacts') || '[]');
    const hiddenMap = {};
    existing.forEach(c => { if (c.hidden) hiddenMap[c.id] = true; });
    const merged = data.map(c => hiddenMap[c.id] ? {...c, hidden: true} : c);
    localStorage.setItem('bni_contacts', JSON.stringify(merged));
    localStorage.setItem('bni_contacts_ver', String(SEED_VERSION));
    render();
  } catch(e) { console.error('SB sync:', e); }
}

function loadContacts() {
  const raw = localStorage.getItem('bni_contacts');
  const ver = parseInt(localStorage.getItem('bni_contacts_ver') || '0');
  if (!raw) { localStorage.setItem('bni_contacts', JSON.stringify(SEED)); localStorage.setItem('bni_contacts_ver', String(SEED_VERSION)); return JSON.parse(JSON.stringify(SEED)); }
  let data = JSON.parse(raw);
  if (ver < SEED_VERSION) {
    const ids = new Set(data.map(c => c.id));
    SEED.forEach(s => { if (!ids.has(s.id)) data.push(s); });
    localStorage.setItem('bni_contacts', JSON.stringify(data));
    localStorage.setItem('bni_contacts_ver', String(SEED_VERSION));
  }
  return data;
}

const AVATAR_COLORS = ['#3b82f6','#8b5cf6','#10b981','#f59e0b','#ec4899','#06b6d4','#f97316'];
const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function extractChapter(c) {
  if (c.chapter) return c.chapter;
  const m = (c.notes || '').match(/BNI Chapter:\s*([^.,(]+)/i);
  return m ? m[1].trim() : '';
}
function hasProposalSent(detail) { return detail.followups.some(f => f.type === 'Proposal'); }

// Extract most-recent DD/MM/YY date from notes text → YYYY-MM-DD
function noteDate(c) {
  const matches = [...(c.notes || '').matchAll(/(\d{2})\/(\d{2})\/(\d{2})/g)];
  if (!matches.length) return null;
  const last = matches[matches.length - 1];
  return '20' + last[3] + '-' + last[2] + '-' + last[1];
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return DAYS[d.getDay()] + ', ' + d.getDate() + ' ' + MONTHS[d.getMonth()];
}

function dateColors(iso) {
  if (!iso) return { bg:'#f8fafc', col:'#cbd5e1', bdr:'#e2e8f0' };
  const today = new Date().toISOString().split('T')[0];
  if (iso < today)  return { bg:'#fef2f2', col:'#dc2626', bdr:'#fecaca' };
  if (iso === today) return { bg:'#fffbeb', col:'#d97706', bdr:'#fde68a' };
  return { bg:'#eff6ff', col:'#1d4ed8', bdr:'#bfdbfe' };
}

function dateTile(detail, c) {
  const iso = detail.nextDate || (c ? noteDate(c) : null);
  const fromNotes = !detail.nextDate && !!iso;
  if (!iso) {
    return `<div class="date-tile" style="background:#f8fafc;border-color:#e2e8f0;color:#cbd5e1;min-height:62px;display:flex;flex-direction:column;align-items:center;justify-content:center;">
      <div class="dt-day">—</div><div class="dt-num" style="font-size:1rem;">?</div><div class="dt-mon">—</div>
    </div>`;
  }
  const d = new Date(iso + 'T00:00:00');
  const {bg,col,bdr} = dateColors(iso);
  // dashed border = date extracted from notes (not manually confirmed)
  const borderStyle = fromNotes ? 'border-style:dashed;' : '';
  return `<div class="date-tile" style="background:${bg};border-color:${bdr};color:${col};${borderStyle}">
    <div class="dt-day">${DAYS[d.getDay()]}</div>
    <div class="dt-num">${d.getDate()}</div>
    <div class="dt-mon">${MONTHS[d.getMonth()]}</div>
  </div>`;
}

  ['all','today','week','overdue','nodate'].forEach(k => {
    const btn = document.getElementById('qf-'+k);
    btn.className = 'qf-btn';
    if (k === f) btn.classList.add(k==='overdue'?'active-red':k==='today'?'active-amber':'active');
  });
  render();
}

function toggleProposal() {
  proposalF = !proposalF;
  const btn = document.getElementById('qf-proposal');
  btn.className = proposalF ? 'qf-btn active-orange' : 'qf-btn';
  render();
}

function buildChapterDropdown(contacts) {
  const chapters = [...new Set(contacts.map(c => extractChapter(c)).filter(Boolean))].sort();
  const sel = document.getElementById('chapterFilter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All BNI Chapters</option>' +
    chapters.map(ch => `<option value="${ch}"${ch===cur?' selected':''}>${ch}</option>`).join('');
}

function renderStats(contacts) {
  const counts = {};
  ['Identified','Contacted','Met','Referred','Cold'].forEach(s => counts[s] = contacts.filter(c => c.status===s).length);
  const today = new Date().toISOString().split('T')[0];
  const overdue = contacts.filter(c => { const d=getDetail(c.id); return d.nextDate && d.nextDate < today; }).length;
  const needsProp = contacts.filter(c => {
    if (c.status!=='Contacted'&&c.status!=='Met') return false;
    return !hasProposalSent(getDetail(c.id));
  }).length;

  document.getElementById('stats-row').innerHTML = [
    { label:'Total',          val: contacts.length,                              color:'#3b82f6' },
    { label:'Met',            val: counts.Met,                                   color:'#8b5cf6' },
    { label:'Referred',       val: counts.Referred,                              color:'#10b981' },
    { label:'Overdue',        val: overdue,                                      color:'#ef4444' },
    { label:'Needs Proposal', val: needsProp,                                    color:'#ea580c' },
  ].map(s => `
    <div class="glass rounded-xl p-4 text-center cursor-pointer hover:shadow-md transition-shadow">
      <p class="text-2xl font-bold" style="color:${s.color}">${s.val}</p>
      <p class="text-slate-500 text-xs mt-0.5">${s.label}</p>
    </div>
  `).join('');
}

function render() {
  const allContacts = loadContacts();
  buildChapterDropdown(allContacts);

  const search   = document.getElementById('searchInput').value.toLowerCase();
  const statusF  = document.getElementById('statusFilter').value;
  const segF     = document.getElementById('segmentFilter').value;
  const chF      = document.getElementById('chapterFilter').value;
  const sortBy   = document.getElementById('sortBy').value;
  const groupBy  = document.getElementById('groupBy').value;
  const today    = new Date().toISOString().split('T')[0];
  const weekEnd  = new Date(Date.now() + 7*864e5).toISOString().split('T')[0];

  renderStats(allContacts);

  let list = allContacts.filter(c => {
    if (c.hidden && !showHidden) return false;
    const detail = getDetail(c.id);
    const txt = ((c.first||'')+' '+(c.last||'')+' '+(c.company||'')+' '+(c.city||'')+' '+(c.notes||'')).toLowerCase();
    if (search && !txt.includes(search)) return false;
    if (statusF && c.status !== statusF) return false;
    if (segF && c.segment !== segF) return false;
    if (chF && extractChapter(c) !== chF) return false;
    if (proposalF) {
      if (c.status!=='Contacted'&&c.status!=='Met') return false;
      if (hasProposalSent(detail)) return false;
    }
    // date filter
    if (activeDateF === 'today')   { if (!detail.nextDate || detail.nextDate !== today) return false; }
    if (activeDateF === 'week')    { if (!detail.nextDate || detail.nextDate < today || detail.nextDate > weekEnd) return false; }
    if (activeDateF === 'overdue') { if (!detail.nextDate || detail.nextDate >= today) return false; }
    if (activeDateF === 'nodate')  { if (detail.nextDate) return false; }
    return true;
  });

  if (sortBy === 'status')   list.sort((a,b) => (STATUS_ORDER[a.status]||9)-(STATUS_ORDER[b.status]||9));
  if (sortBy === 'name')     list.sort((a,b) => (a.first+a.last).localeCompare(b.first+b.last));
  if (sortBy === 'followup') list.sort((a,b) => { const da=getDetail(a.id).nextDate||'9999'; const db=getDetail(b.id).nextDate||'9999'; return da.localeCompare(db); });
  if (sortBy === 'recent')   list.sort((a,b) => { const da=lastActivity(getDetail(a.id))||''; const db=lastActivity(getDetail(b.id))||''; return db.localeCompare(da); });

  document.getElementById('result-count').textContent = list.length + ' contact' + (list.length!==1?'s':'') + ' shown';

  if (!list.length) {
    document.getElementById('member-list').innerHTML = '<p class="text-slate-400 text-center py-16">No members match the current filters.</p>';
    return;
  }

  function cardHTML(c) {
    const detail   = getDetail(c.id);
    const initials = ((c.first?.[0] || '') + (c.last && c.last !== '.S' ? (c.last[0] || '') : '')).toUpperCase() || '?';
    const lastAct  = lastActivity(detail);
    const chapter  = extractChapter(c);
    const noProposal = (c.status==='Contacted'||c.status==='Met') && !hasProposalSent(detail);
    const displayDate = detail.nextDate || noteDate(c);
    const fromNotes   = !detail.nextDate && !!displayDate;
    const {col: dateCol} = dateColors(displayDate);

    return `
      <a href="/bni/member.html?id=${c.id}" class="member-card glass rounded-2xl px-4 py-3 flex items-center gap-3 block no-underline mb-2" style="${c.hidden ? 'opacity:0.45;border-style:dashed;' : ''}">
        ${dateTile(detail, c)}
        <div class="avatar" style="background:${avatarColor(c.id)}18;color:${avatarColor(c.id)};border:2px solid ${avatarColor(c.id)}33;">
          ${initials}
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 flex-wrap">
            <span class="font-semibold text-slate-900">${c.first} ${c.last}</span>
            <span class="badge" style="background:${STATUS_COLOR[c.status]}18;color:${STATUS_COLOR[c.status]};border:1px solid ${STATUS_COLOR[c.status]}55;">${c.status}</span>
            ${noProposal ? '<span class="badge" style="background:#fff7ed;color:#ea580c;border:1px solid #fed7aa;">Send Proposal</span>' : ''}
            ${c.notes.includes('HIGH PRIORITY') ? '<span class="badge" style="background:#fef2f2;color:#dc2626;border:1px solid #fecaca;">Priority</span>' : ''}
          </div>
          <div class="flex items-center gap-2 mt-0.5 flex-wrap text-sm text-slate-600">
            <span class="font-medium">${c.company || '—'}</span>
            ${c.city ? `<span class="flex items-center gap-1" style="color:#3b82f6;font-weight:500;"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 21s-8-7.5-8-12a8 8 0 0 1 16 0c0 4.5-8 12-8 12z"/><circle cx="12" cy="9" r="2.5"/></svg>${c.city}</span>` : ''}
            ${chapter ? `<span class="badge" style="background:#f0f9ff;color:#0369a1;border:1px solid #bae6fd;">${chapter}</span>` : `<span class="badge" style="background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0;">${c.segment}</span>`}
          </div>
          <div class="flex items-center gap-3 mt-0.5 text-xs">
            ${displayDate
              ? `<span class="date-label" style="color:${dateCol};">${fromNotes ? 'Note' : 'Next'}: ${fmtDate(displayDate)}</span>`
              : '<span class="text-slate-400">No date set</span>'}
            ${lastAct ? `<span class="text-slate-400">· Last: ${lastAct}</span>` : ''}
          </div>
        </div>
        <div class="text-slate-300 flex-shrink-0">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
        </div>
      </a>`;
  }

  if (!groupBy) {
    document.getElementById('member-list').innerHTML = list.map(cardHTML).join('');
    return;
  }

  // Build groups
  const groups = {};
  list.forEach(c => {
    const key = groupBy === 'segment' ? c.segment : (extractChapter(c) || 'No Chapter Assigned');
    if (!groups[key]) groups[key] = [];
    groups[key].push(c);
  });

  const segOrder = ['Healthcare','AI / Tech','Industrial Automation','Other'];
  const keys = groupBy === 'segment'
    ? segOrder.filter(k => groups[k]).concat(Object.keys(groups).filter(k => !segOrder.includes(k)))
    : Object.keys(groups).sort();

  document.getElementById('member-list').innerHTML = keys.map(key => `
    <div class="mt-4 mb-1">
      <div class="group-header">
        <span>${key}</span>
        <span style="background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0;padding:2px 8px;border-radius:20px;font-size:0.65rem;">${groups[key].length}</span>
      </div>
      ${groups[key].map(cardHTML).join('')}
    </div>
  `).join('');
}

render();
syncContactsFromSupabase(); // pull fresh data from Supabase in background
</script>
  <script src="bni-sidebar.js"></script>
</body>
</html>
