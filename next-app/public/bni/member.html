    select option { background: white; color: #0f172a; }
    .btn-primary   { background:#3b82f6; color:white; border-radius:8px; padding:8px 16px; font-size:0.875rem; font-weight:500; cursor:pointer; border:none; transition:background 0.15s; }
    .btn-primary:hover { background:#2563eb; }
    .btn-secondary { background:#f1f5f9; color:#475569; border:1px solid #e2e8f0; border-radius:8px; padding:8px 16px; font-size:0.875rem; cursor:pointer; transition:all 0.15s; }
    .btn-secondary:hover { background:#e2e8f0; color:#1e293b; }
    .btn-danger    { background:#fef2f2; color:#dc2626; border:1px solid #fecaca; border-radius:8px; padding:5px 10px; font-size:0.78rem; cursor:pointer; }
    .btn-danger:hover { background:#fee2e2; }
    .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:0.7rem; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; }
    .timeline-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-top:4px; }
    .toast { position:fixed; bottom:24px; right:24px; z-index:9999; padding:12px 20px; border-radius:10px; font-size:0.875rem; font-weight:500; animation:slideUp 0.2s ease; }
    .toast-success { background:#f0fdf4; border:1px solid #bbf7d0; color:#16a34a; }
    .toast-error   { background:#fef2f2; border:1px solid #fecaca; color:#dc2626; }
    @keyframes slideUp { from { transform:translateY(12px); opacity:0; } to { transform:translateY(0); opacity:1; } }
    .section-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.08em; color:#64748b; font-weight:600; margin-bottom:8px; display:block; }
    .photo-ring { cursor:pointer; border-radius:50%; overflow:hidden; border:3px solid #e2e8f0; transition:border-color 0.15s; }
    .photo-ring:hover { border-color:#3b82f6; }

<!-- Nav -->
  <header class="sticky top-0 z-50 border-b border-slate-200" style="background:rgba(248,250,252,0.97);backdrop-filter:blur(20px);">
    <div class="max-w-5xl mx-auto px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2 text-sm">
        <a href="/bni/members.html" class="text-slate-500 hover:text-slate-900 transition-colors flex items-center gap-1">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
          All Members
        </a>
        <span class="text-slate-300">/</span>
        <span id="nav-name" class="text-slate-900 font-medium">—</span>
      </div>
      <div class="flex items-center gap-2">
        <button id="prev-btn" onclick="navigateMember(-1)" class="btn-secondary" style="padding:5px 10px;font-size:0.75rem;">← Prev</button>
        <button id="next-btn" onclick="navigateMember(1)"  class="btn-secondary" style="padding:5px 10px;font-size:0.75rem;">Next →</button>
      </div>

  <div class="max-w-5xl mx-auto px-6 py-8">
    <div class="grid md:grid-cols-3 gap-6">

      <!-- LEFT: Profile card -->
      <div class="md:col-span-1 space-y-4">

        <!-- Avatar + name -->
        <div class="glass rounded-3xl p-6 text-center">
          <!-- Photo upload area -->
          <div class="relative w-24 h-24 mx-auto mb-4">
            <div id="profile-avatar" onclick="document.getElementById('photo-input').click()"
              class="photo-ring w-24 h-24 flex items-center justify-center text-2xl font-bold"
              title="Click to upload photo"></div>
            <div onclick="document.getElementById('photo-input').click()"
              class="absolute bottom-0 right-0 w-6 h-6 rounded-full bg-blue-500 flex items-center justify-center cursor-pointer shadow"
              title="Upload photo">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </div>
            <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="uploadPhoto()" />
          </div>
          <h1 id="profile-name" class="text-xl font-bold text-slate-900 mb-0.5"></h1>
          <p id="profile-company" class="text-slate-500 text-sm mb-0.5 font-medium"></p>
          <p id="profile-city" class="text-blue-500 text-xs font-semibold mb-4 flex items-center justify-center gap-1">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 21s-8-7.5-8-12a8 8 0 0 1 16 0c0 4.5-8 12-8 12z"/><circle cx="12" cy="9" r="2.5"/></svg>
            <span id="profile-city-text"></span>
          </p>
          <div id="profile-badges" class="flex flex-wrap gap-2 justify-center mb-4"></div>

          <!-- Status selector -->
          <div class="text-left">
            <label class="section-label">Status</label>
            <select id="statusSelect" onchange="updateStatus()">
              <option value="Identified">Identified</option>
              <option value="Contacted">Contacted</option>
              <option value="Met">Met</option>
              <option value="Referred">Referred</option>
              <option value="Cold">Cold</option>
            </select>
          </div>

          <!-- Priority -->
          <div class="text-left mt-3">
            <label class="section-label">Priority</label>
            <select id="prioritySelect" onchange="saveDetail()">
              <option value="Normal">Normal</option>
              <option value="High">High</option>
              <option value="Low">Low</option>
            </select>
          </div>
          <!-- BNI_ASSIGNEE_V1 -->
          <div class="text-left mt-3">
            <label class="section-label">Assignee (Developer)</label>
            <select id="assigneeSelect" onchange="saveAssignee()">
              <option value="">— Unassigned —</option>
            </select>
          </div>


          <!-- Hide / Unhide -->
          <div class="text-left mt-4">
            <button id="hide-btn" onclick="toggleHide()"
              class="w-full btn-secondary" style="font-size:0.8rem;">
              Hide Contact
            </button>
          </div>
        </div>

        <!-- Contact info -->
        <div class="glass rounded-2xl p-5">
          <label class="section-label">Contact Details</label>
          <div class="space-y-2">
            <div>
              <label class="text-xs text-slate-500 mb-1 block">BNI Chapter</label>
              <input type="text" id="field-chapter" placeholder="e.g. BNI Dioite, Impetus, FALCON…" oninput="saveContact()" />
            </div>
            <div>
              <label class="text-xs text-slate-500 mb-1 block">Phone</label>
              <input type="tel" id="field-phone" placeholder="+91 98765 43210" oninput="saveContact()" />
            </div>
            <div>
              <label class="text-xs text-slate-500 mb-1 block">Email</label>
              <input type="email" id="field-email" placeholder="name@company.com" oninput="saveContact()" />
            </div>
            <div>
              <label class="text-xs text-slate-500 mb-1 block">LinkedIn</label>
              <input type="url" id="field-linkedin" placeholder="linkedin.com/in/…" oninput="saveDetail()" />
            </div>
            <div>
              <label class="text-xs text-slate-500 mb-1 block">Website</label>
              <input type="url" id="field-website" placeholder="company.com" oninput="saveDetail()" />
            </div>
            <div>
              <label class="text-xs text-slate-500 mb-1 block">Address / Location</label>
              <input type="text" id="field-address" placeholder="Office address or area" oninput="saveDetail(); updateMapsLink()" />
            </div>
          </div>

          <!-- Quick actions -->
          <div class="mt-4 space-y-1.5" id="quick-actions"></div>
        </div>

        <!-- How to Meet -->
        <div class="glass rounded-2xl p-5">
          <label class="section-label">How to Meet</label>
          <select id="field-meetmode" onchange="saveDetail()" class="mb-2">
            <option value="">Select meeting mode…</option>
            <option value="Video Call (Zoom/Meet)">Video Call (Zoom/Meet)</option>
            <option value="In-person at their office">In-person at their office</option>
            <option value="BNI Chapter Meeting">BNI Chapter Meeting</option>
            <option value="WhatsApp Call">WhatsApp Call</option>
            <option value="Coffee / Café">Coffee / Café</option>
            <option value="Hospital / Clinic visit">Hospital / Clinic visit</option>
            <option value="Conference / Event">Conference / Event</option>
          </select>
          <div id="maps-link-row" class="hidden mt-1">
            <a id="maps-link" href="#" target="_blank"
              class="inline-flex items-center gap-1.5 text-xs font-semibold text-blue-600 hover:text-blue-800 transition-colors">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 21s-8-7.5-8-12a8 8 0 0 1 16 0c0 4.5-8 12-8 12z"/><circle cx="12" cy="9" r="2.5"/></svg>
              Open in Google Maps
            </a>
          </div>
        </div>

        <div class="glass rounded-2xl p-5">

          <input type="date" id="nextDate" onchange="saveDetail()" />
          <div id="due-indicator" class="mt-2 text-xs"></div>
        </div>

      </div>

      <div class="md:col-span-2 space-y-4">

        <div class="glass rounded-2xl p-6">

                <option value="Proposal">Proposal Sent</option>
                <option value="Other">Other</option>

            <button class="btn-secondary" onclick="quickLog('WhatsApp')">Quick: WhatsApp</button>

          </div>
        </div>

        <div class="glass rounded-2xl p-6">
          <label class="section-label" style="color:#f97316;">

            Proposal / Pitch Highlights

        </div>

        <div class="glass rounded-2xl p-6">
          <div class="flex items-center justify-between mb-3">
            <label class="section-label mb-0" style="color:#f97316;">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline;margin-right:4px;vertical-align:middle;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
              Proposal PDFs
            </label>
            <button onclick="document.getElementById('pdf-input').click()"
              class="btn-secondary flex items-center gap-1.5" style="font-size:0.78rem;padding:5px 12px;">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Upload PDF
            </button>
            <input type="file" id="pdf-input" accept=".pdf,application/pdf" style="display:none" onchange="uploadPDF()" />
          </div>
          <div id="pdf-list"></div>
        </div>

        <!-- Conversation Highlights -->
        <div class="glass rounded-2xl p-6">
          <label class="section-label" style="color:#8b5cf6;">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline;margin-right:4px;vertical-align:middle;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Conversation Highlights
          </label>
          <textarea id="field-conversation" rows="4" placeholder="Interesting things they said, pain points expressed, business goals, personal interests, topics that resonated…" oninput="saveDetail()"></textarea>
        </div>

        <!-- Action items -->
        <div class="glass rounded-2xl p-6">
          <div class="flex items-center justify-between mb-3">
            <label class="section-label mb-0">Action Items</label>
            <button onclick="addAction()" class="text-blue-600 text-xs hover:text-blue-800 font-semibold">+ Add</button>
          </div>
          <div id="actions-list" class="space-y-2 mb-3"></div>
          <div id="add-action-form" class="hidden">
            <input type="text" id="action-input" placeholder="e.g. Send proposal for AI chatbot…" class="mb-2" />
            <div class="flex gap-2">
              <button class="btn-primary" style="font-size:0.8rem;padding:6px 12px;" onclick="saveAction()">Add</button>
              <button class="btn-secondary" style="font-size:0.8rem;padding:6px 12px;" onclick="cancelAction()">Cancel</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

function loadAllContacts() {
  const raw = localStorage.getItem('bni_contacts');
  const ver = parseInt(localStorage.getItem('bni_contacts_ver') || '0');
  if (!raw) { localStorage.setItem('bni_contacts', JSON.stringify(SEED)); localStorage.setItem('bni_contacts_ver', String(SEED_VERSION)); return JSON.parse(JSON.stringify(SEED)); }
  let data = JSON.parse(raw);
  if (ver < SEED_VERSION) { const ids = new Set(data.map(c => c.id)); SEED.forEach(s => { if (!ids.has(s.id)) data.push(s); }); localStorage.setItem('bni_contacts', JSON.stringify(data)); localStorage.setItem('bni_contacts_ver', String(SEED_VERSION)); }
  return data;
}

function saveAllContacts(data) {
  localStorage.setItem('bni_contacts', JSON.stringify(data));
  const sbData = data.map(c => ({
    id: c.id, first: c.first || '', last: c.last || '',
    company: c.company || '', city: c.city || '',
    phone: c.phone || '', email: c.email || '',
    segment: c.segment || 'Other', status: c.status || 'Identified',
    notes: c.notes || '', chapter: c.chapter || '',
    hidden: c.hidden || false
  }));
  _sb.from('bni_contacts').upsert(sbData).then(({error}) => {
    if (error) console.error('SB contacts save:', error.message);
  });
}

function loadDetail(id) {
  const defaults = '{"followups":[],"nextDate":"","linkedin":"","website":"","about":"","priority":"Normal","actions":[],"photo":"","address":"","meetmode":"","proposal":"","conversation":""}';
  return JSON.parse(localStorage.getItem('bni_detail_' + id) || defaults);
}
function saveDetailData(id, data) {
  localStorage.setItem('bni_detail_' + id, JSON.stringify(data));
  const row = {
    contact_id:  id,
    followups:   data.followups   || [],
    next_date:   data.nextDate    || null,
    linkedin:    data.linkedin    || '',
    website:     data.website     || '',
    about:       data.about       || '',
    priority:    data.priority    || 'Normal',
    actions:     data.actions     || [],
    photo:       data.photo       || '',
    address:     data.address     || '',
    meetmode:    data.meetmode    || '',
    proposal:    data.proposal    || '',
    conversation:data.conversation|| '',
    pdfs:        data.pdfs        || [],
    updated_at:  new Date().toISOString()
  };
  _sb.from('bni_contact_details').upsert(row, { onConflict: 'contact_id' }).then(({error}) => {
    if (error) console.error('SB detail save:', error.message);
  });
}

function renderDueIndicator(date) {
  const el = document.getElementById('due-indicator');
  if (!date) { el.textContent = ''; return; }
  const today = new Date().toISOString().split('T')[0];
  if (date < today) el.innerHTML = '<span style="color:#dc2626;font-weight:600;">⚠ Overdue</span>';
  else if (date === today) el.innerHTML = '<span style="color:#d97706;font-weight:600;">Due today</span>';
  else el.innerHTML = `<span style="color:#16a34a;font-weight:600;">Scheduled: ${date}</span>`;
}

function renderTimeline(detail) {
  const fus = [...(detail.followups || [])].reverse();
  document.getElementById('followup-count').textContent = fus.length + ' entr' + (fus.length === 1 ? 'y' : 'ies');

  if (!fus.length) {
    document.getElementById('timeline').innerHTML = '<p class="text-slate-400 text-sm text-center py-6">No follow-ups logged yet. Add your first entry above.</p>';
    return;
  }

  document.getElementById('timeline').innerHTML = fus.map((f, ri) => {
    const realIdx = (detail.followups.length - 1) - ri;
    const tc = TYPE_COLOR[f.type] || '#64748b';
    return `
      <div class="flex gap-3">
        <div class="flex flex-col items-center">
          <div class="timeline-dot" style="background:${tc};"></div>
          ${ri < fus.length - 1 ? '<div class="w-px flex-1 mt-1" style="background:#e2e8f0;min-height:20px;"></div>' : ''}
        </div>
        <div class="flex-1 pb-4">
          <div class="flex items-center gap-2 mb-1 flex-wrap">
            <span class="text-xs font-semibold" style="color:${tc};">${f.type}</span>
            <span class="text-slate-400 text-xs">${f.date}</span>
            <button onclick="deleteFollowup(${realIdx})" class="btn-danger ml-auto" style="padding:2px 8px;font-size:0.7rem;">Delete</button>
          </div>
          ${f.note ? `<p class="text-slate-700 text-sm leading-relaxed">${f.note.replace(/\n/g,'<br>')}</p>` : '<p class="text-slate-400 text-xs italic">No notes added.</p>'}
        </div>
      </div>
    `;
  }).join('');
}

function renderActions(detail) {
  const actions = detail.actions || [];
  if (!actions.length) {
    document.getElementById('actions-list').innerHTML = '<p class="text-slate-400 text-xs">No action items yet.</p>';
    return;
  }
  document.getElementById('actions-list').innerHTML = actions.map((a, i) => `
    <div class="flex items-center gap-3 py-1">
      <input type="checkbox" ${a.done ? 'checked' : ''} onchange="toggleAction(${i})"
        class="w-4 h-4 rounded cursor-pointer" style="width:16px;height:16px;flex-shrink:0;accent-color:#3b82f6;" />
      <span class="text-sm flex-1 ${a.done ? 'line-through text-slate-400' : 'text-slate-700'}">${a.text}</span>
      <button onclick="deleteAction(${i})" class="btn-danger" style="padding:2px 8px;font-size:0.7rem;">✕</button>
    </div>
  `).join('');
}

let _currentInitials = '', _currentColor = '#3b82f6';

function renderPhoto(photo, initials, color) {
  _currentInitials = initials; _currentColor = color;
  const av = document.getElementById('profile-avatar');
  if (photo) {
    av.style.backgroundImage = `url(${photo})`;
    av.style.backgroundSize = 'cover';
    av.style.backgroundPosition = 'center';
    av.style.background = '';
    av.textContent = '';
    av.style.color = '';
    av.style.border = '3px solid #e2e8f0';
  } else {
    av.style.backgroundImage = '';
    av.style.background = color + '18';
    av.style.color = color;
    av.style.border = '2px solid ' + color + '44';
    av.textContent = initials;
  }
}

function uploadPhoto() {
  const file = document.getElementById('photo-input').files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const detail = loadDetail(currentId);
    detail.photo = e.target.result;
    saveDetailData(currentId, detail);
    renderPhoto(detail.photo, _currentInitials, _currentColor);
    toast('Photo saved');
  };
  reader.readAsDataURL(file);
}

// ── PROPOSAL PDFs ──────────────────────────────────────────────────────────
function uploadPDF() {
  const file = document.getElementById('pdf-input').files[0];
  if (!file) return;
  if (file.size > 4 * 1024 * 1024) return toast('PDF too large (max 4 MB)', 'error');
  const reader = new FileReader();
  reader.onload = e => {
    const detail = loadDetail(currentId);
    if (!detail.pdfs) detail.pdfs = [];
    detail.pdfs.push({
      name: file.name,
      data: e.target.result,
      date: new Date().toISOString().split('T')[0],
      size: (file.size / 1024).toFixed(0) + ' KB'
    });
    try {
      saveDetailData(currentId, detail);
      renderPDFs(detail);
      toast('PDF uploaded: ' + file.name);
    } catch (ex) {
      toast('Storage full — try a smaller PDF', 'error');
      detail.pdfs.pop();
    }
    document.getElementById('pdf-input').value = '';
  };
  reader.readAsDataURL(file);
}

      </a>
      <button onclick="deletePDF(${i})" class="btn-danger" style="padding:4px 8px;font-size:0.7rem;flex-shrink:0;">✕</button>
    </div>
  `).join('');
}

function deletePDF(idx) {
  if (!confirm('Remove this PDF?')) return;
  const detail = loadDetail(currentId);
  detail.pdfs.splice(idx, 1);
  saveDetailData(currentId, detail);
  renderPDFs(detail);
  toast('PDF removed');
}

// ── MAPS ───────────────────────────────────────────────────────────────────
function updateMapsLink() {
  const addr = document.getElementById('field-address').value.trim();
  const all  = loadAllContacts();
  const c    = all.find(x => x.id === currentId);
  const q    = addr || (c ? (c.company + ' ' + (c.city || '')).trim() : '');
  const row  = document.getElementById('maps-link-row');
  const lnk  = document.getElementById('maps-link');
  if (q) {
    lnk.href = 'https://www.google.com/maps/search/' + encodeURIComponent(q) + '?hl=en';
    row.classList.remove('hidden');
  } else {
    row.classList.add('hidden');
  }
}

// ── SAVES ──────────────────────────────────────────────────────────────────
function saveContact() {
  const all = loadAllContacts();
  const idx = all.findIndex(c => c.id === currentId);
  if (idx === -1) return;
  all[idx].chapter = document.getElementById('field-chapter').value.trim();
  all[idx].phone   = document.getElementById('field-phone').value.trim();
  all[idx].email   = document.getElementById('field-email').value.trim();
  all[idx].notes   = document.getElementById('field-notes').value.trim();
  saveAllContacts(all);
}

function saveDetail() {
  const detail = loadDetail(currentId);
  detail.linkedin     = document.getElementById('field-linkedin').value.trim();
  detail.website      = document.getElementById('field-website').value.trim();
  detail.about        = document.getElementById('field-about').value.trim();
  detail.nextDate     = document.getElementById('nextDate').value;
  detail.priority     = document.getElementById('prioritySelect').value;
  detail.address      = document.getElementById('field-address').value.trim();
  detail.meetmode     = document.getElementById('field-meetmode').value;
  detail.proposal     = document.getElementById('field-proposal').value.trim();
  detail.conversation = document.getElementById('field-conversation').value.trim();
  if (!detail.actions) detail.actions = [];
  saveDetailData(currentId, detail);
  renderDueIndicator(detail.nextDate);
}

function updateStatus() {
  const all = loadAllContacts();
  const idx = all.findIndex(c => c.id === currentId);
  if (idx === -1) return;
  all[idx].status = document.getElementById('statusSelect').value;
  saveAllContacts(all);
  toast('Status updated to ' + all[idx].status);
  // Refresh badges
  const sc = STATUS_COLOR[all[idx].status] || '#64748b';
  const badgeEl = document.getElementById('profile-badges').querySelector('.badge');
  badgeEl.style.background = sc + '18';
  badgeEl.style.color = sc;
  badgeEl.style.borderColor = sc + '55';
  badgeEl.textContent = all[idx].status;
}

function toggleHide() {
  const all = loadAllContacts();
  const c = all.find(x => x.id === currentId);
  if (!c) return;
  c.hidden = !c.hidden;
  saveAllContacts(all);
  const btn = document.getElementById('hide-btn');
  if (c.hidden) {
    btn.textContent = 'Unhide Contact';
    btn.style.background = '#fef2f2';
    btn.style.color = '#dc2626';
    btn.style.borderColor = '#fecaca';
    toast('Contact hidden — won\'t appear in the list');
  } else {
    btn.textContent = 'Hide Contact';
    btn.style.background = '';
    btn.style.color = '';
    btn.style.borderColor = '';
    toast('Contact is now visible again');
  }
}

// ── FOLLOW-UPS ─────────────────────────────────────────────────────────────
function addFollowup() {
  const date = document.getElementById('fu-date').value;
  const type = document.getElementById('fu-type').value;
  const note = document.getElementById('fu-note').value.trim();
  if (!date) return toast('Select a date', 'error');

  const detail = loadDetail(currentId);
  detail.followups.push({ date, type, note, ts: Date.now() });
  saveDetailData(currentId, detail);
  document.getElementById('fu-note').value = '';
  renderTimeline(detail);
  toast('Follow-up logged');

  // Auto-advance status
  const all = loadAllContacts();
  const c = all.find(x => x.id === currentId);
  if (c && c.status === 'Identified') {
    c.status = 'Contacted';
    saveAllContacts(all);
    document.getElementById('statusSelect').value = 'Contacted';
    toast('Status auto-updated to Contacted');
  }
}

function quickLog(type) {
  const today = new Date().toISOString().split('T')[0];
  const detail = loadDetail(currentId);
  detail.followups.push({ date: today, type, note: '', ts: Date.now() });
  saveDetailData(currentId, detail);
  renderTimeline(detail);
  toast(type + ' logged for today');
}

function deleteFollowup(idx) {
  if (!confirm('Delete this follow-up entry?')) return;
  const detail = loadDetail(currentId);
  detail.followups.splice(idx, 1);
  saveDetailData(currentId, detail);
  renderTimeline(detail);
  toast('Entry deleted');
}

// ── ACTIONS ────────────────────────────────────────────────────────────────
function addAction() {
  document.getElementById('add-action-form').classList.remove('hidden');
  document.getElementById('action-input').focus();
}
function cancelAction() { document.getElementById('add-action-form').classList.add('hidden'); document.getElementById('action-input').value = ''; }
function saveAction() {
  const text = document.getElementById('action-input').value.trim();
  if (!text) return;
  const detail = loadDetail(currentId);
  if (!detail.actions) detail.actions = [];
  detail.actions.push({ text, done: false });
  saveDetailData(currentId, detail);
  cancelAction();
  renderActions(detail);
  toast('Action item added');
}
function toggleAction(idx) {
  const detail = loadDetail(currentId);
  detail.actions[idx].done = !detail.actions[idx].done;
  saveDetailData(currentId, detail);
  renderActions(detail);
}
function deleteAction(idx) {
  const detail = loadDetail(currentId);
  detail.actions.splice(idx, 1);
  saveDetailData(currentId, detail);
  renderActions(detail);
}

// ── SUPABASE SYNC ──────────────────────────────────────────────────────────
let _sbSyncing = false;

async function syncDetailFromSupabase(id) {
  if (_sbSyncing) return;
  try {
    // Sync contact record
    const { data: c } = await _sb.from('bni_contacts').select('*').eq('id', id).maybeSingle();
    if (c) {
      const all = loadAllContacts();
      const idx = all.findIndex(x => x.id === id);
      if (idx >= 0) Object.assign(all[idx], c);
      else all.push(c);
      localStorage.setItem('bni_contacts', JSON.stringify(all));
    }
    // Sync detail record
    const { data: d } = await _sb.from('bni_contact_details').select('*').eq('contact_id', id).maybeSingle();
    if (d) {
      const detail = {
        followups:    d.followups    || [],
        nextDate:     d.next_date    || '',
        linkedin:     d.linkedin     || '',
        website:      d.website      || '',
        about:        d.about        || '',
        priority:     d.priority     || 'Normal',
        actions:      d.actions      || [],
        photo:        d.photo        || '',
        address:      d.address      || '',
        meetmode:     d.meetmode     || '',
        proposal:     d.proposal     || '',
        conversation: d.conversation || '',
        pdfs:         d.pdfs         || []
      };
      localStorage.setItem('bni_detail_' + id, JSON.stringify(detail));
      _sbSyncing = true;
      init(); // re-populate all fields with fresh data
      _sbSyncing = false;
    }
  } catch(e) { console.error('SB detail sync:', e); }
}

// ── TOAST ──────────────────────────────────────────────────────────────────
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type === 'error' ? 'toast-error' : 'toast-success');
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 2200);
}

// Fields save via individual oninput/onchange handlers on each element — no blanket listener needed

init();
</script>
<script>
// BNI_ASSIGNEE_V1
async function loadAndPopulateAssignees(currentAssigneeId) {
  const sel = document.getElementById('assigneeSelect');
  if (!sel) return;
  try {
    const { data, error } = await _sb.from('developers').select('id,name').order('name');
    if (error) { console.error('devs load:', error.message); return; }
    const opts = ['<option value="">— Unassigned —</option>'].concat(
      (data || []).map(d =>
        '<option value="' + d.id + '"' + (d.id === currentAssigneeId ? ' selected' : '') + '>' + d.name + '</option>'
      )
    );
    sel.innerHTML = opts.join('');
  } catch (e) { console.error(e); }
}

async function saveAssignee() {
  const sel = document.getElementById('assigneeSelect');
  if (!sel) return;
  const val = sel.value || null;
  const { error } = await _sb.from('bni_contacts').update({ assignee_id: val }).eq('id', currentId);
  if (error) {
    console.error('assignee save:', error.message);
    alert('Could not save assignee: ' + error.message);
    return;
  }
  try {
    const all = loadAllContacts();
    const idx = all.findIndex(function(c){ return c.id === currentId; });
    if (idx !== -1) { all[idx].assignee_id = val; saveAllContacts(all); }
  } catch(_) {}
}

async function loadAssigneeForCurrentContact() {
  try {
    const { data, error } = await _sb.from('bni_contacts').select('assignee_id').eq('id', currentId).maybeSingle();
    if (error) { console.error('assignee fetch:', error.message); return null; }
    return data ? data.assignee_id : null;
  } catch (e) { return null; }
}

(async () => {
  if (typeof currentId === 'undefined') return;
  const aid = await loadAssigneeForCurrentContact();
  await loadAndPopulateAssignees(aid);
})();
</script>
