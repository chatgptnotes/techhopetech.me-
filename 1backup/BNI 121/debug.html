<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>BNI DB connection probe</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<style>
  body { font: 14px monospace; padding: 20px; background: #0f172a; color: #e2e8f0; }
  .ok    { color: #4ade80; }
  .fail  { color: #f87171; }
  .label { color: #93c5fd; }
  pre { background: #1e293b; padding: 10px; border-radius: 6px; overflow:auto; }
</style>
</head>
<body>
<h2>BNI database connection probe</h2>
<div id="out"></div>
<script>
const out = document.getElementById('out');
function log(label, ok, detail) {
  const div = document.createElement('div');
  div.innerHTML = `<div><span class="label">${label}:</span> <span class="${ok ? 'ok' : 'fail'}">${ok ? 'OK' : 'FAIL'}</span></div><pre>${detail}</pre>`;
  out.appendChild(div);
}
window.addEventListener('error', e => log('window.error', false, e.message + '\n' + (e.error && e.error.stack || '')));
window.addEventListener('unhandledrejection', e => log('unhandledrejection', false, (e.reason && (e.reason.stack || e.reason.message)) || String(e.reason)));

(async () => {
  log('window.supabase loaded', !!window.supabase, typeof window.supabase);
  log('window.sb created',      !!window.sb,       window.sb ? Object.keys(window.sb).slice(0,10).join(', ') : 'undefined');

  try {
    const r = await window.sb.from('bni_contacts').select('id,first,last,company,status,hidden').order('id').limit(5);
    log('bni_contacts select', !r.error, JSON.stringify({ error: r.error, count: (r.data||[]).length, sample: r.data }, null, 2));
  } catch (e) { log('bni_contacts threw', false, e.stack || e.message); }

  try {
    const r = await window.sb.from('bni_contacts').select('*', { count: 'exact', head: true });
    log('bni_contacts COUNT', !r.error, JSON.stringify({ error: r.error, count: r.count }, null, 2));
  } catch (e) { log('bni_contacts COUNT threw', false, e.stack || e.message); }

  try {
    const r = await window.sb.from('developers').select('id,name').limit(3);
    log('developers select', !r.error, JSON.stringify({ error: r.error, count: (r.data||[]).length, sample: r.data }, null, 2));
  } catch (e) { log('developers threw', false, e.stack || e.message); }

  try {
    const r = await window.sb.from('bni_chapters').select('id,name').limit(3);
    log('bni_chapters select', !r.error, JSON.stringify({ error: r.error, count: (r.data||[]).length, sample: r.data }, null, 2));
  } catch (e) { log('bni_chapters threw', false, e.stack || e.message); }
})();
</script>
</body>
</html>
