<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In · BNI 121</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style> body { background:#0f172a; } </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-slate-100">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-blue-600 mb-4 text-2xl font-bold">B</div>
      <h1 class="text-2xl font-semibold">BNI 121 Admin</h1>
      <p class="text-slate-400 text-sm mt-1">Sign in to access the dashboard</p>
    </div>

    <form id="loginForm" class="bg-slate-800/60 border border-slate-700 rounded-2xl p-6 space-y-4" autocomplete="on">
      <div>
        <label class="block text-xs text-slate-400 mb-1.5" for="loginId">Login ID</label>
        <input id="loginId" name="username" type="text" autocomplete="username" required
               class="w-full rounded-lg bg-slate-900 border border-slate-700 px-3 py-2.5 text-slate-100 focus:outline-none focus:border-blue-500" />
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1.5" for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required
               class="w-full rounded-lg bg-slate-900 border border-slate-700 px-3 py-2.5 text-slate-100 focus:outline-none focus:border-blue-500" />
      </div>
      <button id="loginBtn" type="submit"
              class="w-full rounded-lg bg-blue-600 hover:bg-blue-500 transition-colors py-2.5 font-medium">Sign In</button>
      <p id="loginError" class="text-rose-400 text-sm text-center hidden">Incorrect Login ID or password</p>
    </form>

    <p class="text-center text-slate-600 text-xs mt-6">HopeTech · BNI 121</p>
  </div>

  <script>
  // ── Admin credentials — change these to your own ───────────────────────────
  const ADMIN_ID = 'admin';
  const ADMIN_PW = 'HopeTech@2026';
  // ───────────────────────────────────────────────────────────────────────────

  // Only allow same-origin relative .html targets — blocks open-redirect abuse.
  function safeNext() {
    const p = new URLSearchParams(location.search).get('next') || '';
    return /^[A-Za-z0-9_\-]+\.html(\?.*)?$/.test(p) ? p : '';
  }

  // Already signed in → skip the login screen.
  if (localStorage.getItem('bni_crm_auth') === '1') {
    location.replace(safeNext() || 'dashboard.html');
  }

  document.getElementById('loginForm').addEventListener('submit', function (e) {
    e.preventDefault();
    const id = document.getElementById('loginId').value.trim();
    const pw = document.getElementById('password').value;
    if (id === ADMIN_ID && pw === ADMIN_PW) {
      localStorage.setItem('bni_crm_auth', '1');
      localStorage.setItem('ht_admin_session', '1'); // single sign-on: also unlocks admin.html
      location.replace(safeNext() || 'dashboard.html');
    } else {
      document.getElementById('loginError').classList.remove('hidden');
      document.getElementById('password').value = '';
    }
  });
  </script>
</body>
</html>
